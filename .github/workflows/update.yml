name: Auto Scrape Nodes

on:
  schedule:
    - cron: "0 0 */2 * *"   # 每两天的 UTC 0 点运行
  workflow_dispatch: # 允许你在 GitHub 网页上点击按钮手动运行

permissions:     # 赋予 GitHub Actions 推送代码的权限
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper Script
        run: |
          python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "actions-user"
          git add output/*
          git commit -m "自动更新节点: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
